<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyhetsCRUD — Demo</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header>
      <div class="header-content">
        <div>
          <h1>NyhetsCRUD</h1>
          <p>Demo av CRUD-operasjoner mot en lokal JSON-server</p>
        </div>
        <button id="logout-btn" class="btn btn-logout" style="display:none">
          Logg ut
        </button>
      </div>
    </header>

    <main>

      <!-- Venstre kolonne: artikkel-listen -->
      <section id="articles-section">
        <h2>Nyhetssaker</h2>
        <div id="news-list">
          <p class="empty-state">Laster inn...</p>
        </div>
      </section>

      <!-- Høyre kolonne: viser enten login-skjema eller nyhets-skjema -->

      <!-- Login-seksjon: synlig som standard, skjules av script.js etter innlogging -->
      <section id="login-section">
        <h2>Logg inn</h2>
        <form id="login-form">

          <label for="login-email">E-post</label>
          <input type="email" id="login-email" required placeholder="din@epost.no" autocomplete="email" />

          <label for="login-password">Passord</label>
          <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password" />

          <!-- Feilmelding — skjult som standard, vises av script.js ved feil innlogging -->
          <p id="login-error" class="login-error" style="display:none"></p>

          <button type="submit" class="btn btn-primary btn-full">Logg inn</button>

        </form>
      </section>

      <!-- Nyhets-skjema: skjult som standard, vises av script.js etter innlogging -->
      <section id="form-section" style="display:none">
        <h2 id="form-title">Legg til nyhetssak</h2>
        <form id="news-form">

          <label for="title">Tittel</label>
          <input type="text" id="title" required placeholder="Skriv tittel..." />

          <label for="summary">Ingress</label>
          <input type="text" id="summary" required placeholder="Kort oppsummering..." />

          <label for="body">Brødtekst</label>
          <textarea id="body" required rows="4" placeholder="Artikkeltekst..."></textarea>

          <label for="category">Kategori</label>
          <select id="category">
            <option value="teknologi">Teknologi</option>
            <option value="samfunn">Samfunn</option>
            <option value="kultur">Kultur</option>
            <option value="sport">Sport</option>
            <option value="økonomi">Økonomi</option>
          </select>

          <label for="authorId">Forfatter</label>
          <select id="authorId"></select>

          <label class="checkbox-label">
            <input type="checkbox" id="published" />
            Publiser med en gang
          </label>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary">Publiser</button>
            <button type="button" id="cancel-btn" class="btn btn-secondary">Avbryt</button>
          </div>

        </form>
      </section>

    </main>

    <script type="module" src="js/script.js"></script>

  </body>
</html>
